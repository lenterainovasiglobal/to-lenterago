<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lenterago - Pilih Try Out</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --primary: #17bbef; --accent: #ff7f0d; --border: #e2e8f0; }
    html { overflow-y: scroll; }
    body { font-family: "Plus Jakarta Sans", sans-serif; background: #f8fafc; color: #1e293b; -webkit-font-smoothing: antialiased; }

    .box-input { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
    .field { width: 100%; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-weight: 700; font-size: 13px; }
    .field:focus { outline: none; border-color: var(--primary); }

    .btn { border-radius: 8px; font-weight: 800; padding: 8px 14px; font-size: 12px; transition: 0.2s; cursor: pointer; }
    .btn-primary { background: var(--primary); color: #fff; }

    .prog-item { background: #fff; border: 1px solid var(--border); border-radius: 16px; margin-bottom: 10px; overflow: hidden; scroll-margin-top: 150px;}
    .prog-item.active { border-color: var(--primary); box-shadow: 0 4px 20px rgba(23,187,239,0.08); }
    .prog-item.active .p-5 { padding: 12px 20px !important; }

    /* --- BAGIAN SCROLL AREA --- */
    /* Mengurangi padding di area scroll agar kartu lebih mepet ke atas (ke judul kategori) */
    .pkg-grid-scroll, .cat-scroll-area { display: flex; gap: 12px; overflow-x: auto; scrollbar-width: none; }
    .pkg-grid-scroll { 
        padding: 4px 16px !important; /* Padding atas-bawah dikecilkan dari 10px jadi 4px */
        margin-bottom: 0 !important;
    }
    .cat-scroll-area { padding-bottom: 4px; padding-top: 50px; margin-top: -30px; }

    .cat-btn { padding: 6px 20px; border-radius: 999px; border: 1.5px solid var(--border); font-size: 17px; font-weight: 700; background: #fff; white-space: nowrap; transition: 0.2s; }
    .cat-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    
    .btn-primary:hover { filter: brightness(1.08); transform: translateY(-1px); }
    .summary-card { background:#fff; border:1px solid var(--border); border-radius:16px; padding:16px; }
    .small { font-size:12px; font-weight:900; letter-spacing:.12em; text-transform:uppercase; color:#0ea5e9; }

    /* =========================================
       PERBAIKAN COMPACT (LAYOUT UTAMA)
       ========================================= */
    
    /* 1. Target Pembungkus per Kategori yang dibuat JS (misal: Div pembungkus SIAP KULIAH) */
    /* Ini akan menarik jarak antar kategori besar */
    #programList > div {
        margin-bottom: 16px !important; /* Jarak antar kategori besar (misal Siap Kuliah ke Siap Kerja) */
        margin-top: 0 !important;
    }

    /* 2. Target Judul Kategori (Teks SIAP KULIAH, UTBK, dll) */
    /* Memaksa judul menempel rapat dengan kartu di bawahnya */
    #programList h2, 
    #programList h3, 
    #programList .text-xl, 
    #programList .text-2xl,
    #programList .font-bold {
        margin-bottom: 4px !important; /* Jarak judul ke kartu sangat dekat */
        margin-top: 0 !important;
        padding-bottom: 0 !important;
        line-height: 1.2 !important;
    }

    /* 3. Style Kartu (Normal, tidak terlalu gepeng di dalam, tapi jarak luar rapat) */
    .pkg-card { 
      flex: 0 0 280px; 
      background: #fff; 
      border: 1.5px solid var(--border); 
      border-radius: 14px; 
      padding: 12px; 
      display: flex; 
      flex-direction: column; 
      cursor: pointer; 
      position: relative;
      margin-top: 0 !important; /* Pastikan tidak ada margin tak terduga */
    }
    
    .pkg-card:hover { border-color: var(--primary); background: #f0fbff; transform: translateY(-2px); }

    /* Benefit list dikembalikan normal/rapi */
    .benefit-ui { font-size: 12px; color: #1e293b; margin-bottom: 12px; flex-grow: 1; list-style: none; padding: 0; margin-top: 8px; }
    .benefit-ui li { display: flex; align-items: flex-start; margin-bottom: 4px; line-height: 1.4; }
    .benefit-ui li::before { content: "✓"; color: #22c55e; margin-right: 8px; font-weight: 900; flex-shrink: 0; }

    /* =========================================
       END PERBAIKAN COMPACT
       ========================================= */

    @keyframes bounceClue {
      0%, 100% { transform: translate(-50%, 0); }
      50% { transform: translate(-50%, -5px); }
    }
    .clue-animate { animation: bounceClue 1.5s infinite ease-in-out; }
  </style>
</head>
<body class="p-4 md:p-8">
  <div id="siteHeader"></div>

  <main class="max-w-7xl mx-auto pt-[92px]">
    <div class="grid grid-cols-1 md:grid-cols-[80fr_20fr] gap-8 items-start">
      <div class="w-full min-w-0">
        <h1 class="text-xl font-extrabold mb-4">Pilih Program Try Out</h1>
        
        <div id="programList"></div>
      </div>

      <div class="w-full flex flex-col gap-4 md:mt-[44px] md:sticky md:top-[110px]">
        <div class="box-input flex flex-col justify-center border-sky-200">
          <label class="text-[12px] font-black uppercase tracking-widest mb-2 text-sky-500">Kode Referral</label>
          <div class="flex gap-2">
            <input id="ref_in" class="field" placeholder="Ketik kode..." style="text-transform:uppercase" />
            <button onclick="applyRef()" class="btn btn-primary">Simpan</button>
          </div>
          <p id="ref_msg" class="hidden"></p>
        </div>

        <div class="box-input flex flex-col justify-center border-sky-200">
          <label class="text-[12px] font-black uppercase tracking-widest mb-2 text-sky-500">Kode Promo</label>
          <div class="flex gap-2">
            <input id="pro_in" class="field" placeholder="Contoh: RMD1010" style="text-transform:uppercase" />
            <button onclick="applyPro()" class="btn btn-primary">Gunakan</button>
          </div>
          <p id="pro_msg" class="hidden"></p>
        </div>

        <div class="summary-card relative overflow-hidden min-h-[120px]">
          <label class="small">Rekening Tujuan</label>
          <div class="mt-4 pr-20">
            <img src="/assets/mandiri.png" alt="Bank Mandiri" class="h-10 w-auto mb-2 object-contain block" />
            <div class="flex items-center gap-3">
              <div id="rekening" class="text-2xl font-black text-slate-800 tracking-tighter">1030012515330</div>
              <button class="p-1.5 bg-slate-50 border border-slate-200 rounded-md hover:bg-sky-50 transition-colors group" onclick="copyRek()" title="Salin">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-400 group-hover:text-sky-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                </svg>
              </button>
            </div>
            <div class="mt-1"><p class="text-sm font-bold text-slate-500 uppercase">LENTERA INOVASI GLOBAL</p></div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <div id="siteFooter"></div>

  <script src="../assets/discount.js"></script>
  <script src="../assets/program.js"></script>

  <script>
    async function injectPart(id, file) {
      const el = document.getElementById(id);
      if(!el) return;
      try {
        const res = await fetch(file);
        if (res.ok) el.innerHTML = await res.text();
      } catch(e) {}
    }

    injectPart("siteHeader", "../header.html").then(() => {
      const menuBtn = document.getElementById("menuBtn");
      const mobileNav = document.getElementById("mobileNav");
      menuBtn?.addEventListener("click", () => mobileNav.classList.toggle("hidden"));
    });

    injectPart("siteFooter", "../footer.html");
  </script>
</body>
</html>

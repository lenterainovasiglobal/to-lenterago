<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Beranda | Lenterago </title>
    
  <link rel="icon" type="image/png" href="assets/favicon.svg">
    
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Montserrat:wght@700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
            montserrat: ['Montserrat', 'sans-serif'],
          },
          colors: {
            primaryBlue: '#0b7cd2',
            lightBlue: '#1c6ecc',
            primaryYellow: '#fbc13d',
            lightPink: '#fff5f5',
            whatsapp: '#25D366',
          },
          keyframes: {
            fadeUp: {
              '0%': { opacity: 0, transform: 'translateY(30px) scale(0.95)' },
              '100%': { opacity: 1, transform: 'translateY(0) scale(1)' }
            },
            shimmer: {
              '100%': { transform: 'translateX(100%)' }
            },
            slideDown: {
              '0%': { opacity: 0, transform: 'translateY(-20px)' },
              '100%': { opacity: 1, transform: 'translateY(0)' }
            },
            popIn: {
              '0%': { opacity: 0, transform: 'scale(0.9)' },
              '100%': { opacity: 1, transform: 'scale(1)' }
            }
          },
          animation: {
            fadeUp: 'fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            slideDown: 'slideDown 0.3s ease-out forwards',
            popIn: 'popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards',
          }
        }
      }
    }
  </script>

  <style>
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    .card-glass {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
      
    .card-glass:hover {
      transform: translateY(-12px);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
    }

    .btn-glow:hover {
      box-shadow: 0 0 20px rgba(251, 193, 61, 0.6);
      transform: scale(1.03);
    }

    .shimmer-wrapper {
      position: relative;
      overflow: hidden;
      background: #e2e8f0;
      border-radius: 20px;
    }

    .shimmer-wrapper::after {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      animation: shimmer 1.5s infinite;
    }

    @keyframes float-gentle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-25px); }
    }

    .animate-float {
      animation: float-gentle 5s ease-in-out infinite;
    }
  </style>
</head>

<body class="bg-slate-50 text-slate-900 overflow-x-hidden">

  <div id="siteHeader"></div>

  <main class="pt-[70px] md:pt-[70px]">

    <section class="relative bg-primaryBlue overflow-hidden min-h-[500px] md:min-h-[600px] flex items-center">
      <img src="images/bg-1.png" class="absolute inset-0 w-full h-full object-cover">
      <div class="relative max-w-[1376px] mx-auto px-6 py-12 md:py-20 lg:grid lg:grid-cols-2 gap-12 items-center">
        <div class="animate-fadeUp text-center lg:text-left">
          <h1 class="font-extrabold text-4xl md:text-5xl lg:text-7xl leading-tight mb-6 md:mb-8 text-white">
            Persiapan Tryout <br class="hidden md:block">
            <span class="text-primaryYellow drop-shadow-sm">UTBK 2026</span> &
            <span class="text-primaryYellow drop-shadow-sm">SAT</span>
          </h1>
          <p class="font-medium text-blue-50 text-lg md:text-xl lg:text-2xl max-w-[580px] mb-8 md:mb-12 leading-relaxed mx-auto lg:mx-0">
            Platform try out terlengkap dengan sistem <span class="font-bold underline decoration-primaryYellow">CBT profesional</span>. Kerjakan soal-soal berkualitas yang dirancang dari ujian asli.
          </p>
          <div class="flex flex-col md:flex-row gap-4 md:gap-6 justify-center lg:justify-start">
            <a href="https://to.lenterago.id/daftar" class="bg-primaryYellow text-primaryBlue font-extrabold text-lg px-8 py-3 md:px-10 md:py-4 rounded-xl btn-glow transition-all">
              Daftar Sekarang
            </a>
            <button id="btn-cek-jadwal" class="bg-white/10 backdrop-blur-sm border-2 border-white text-white font-bold text-lg px-8 py-3 md:px-10 md:py-4 rounded-xl hover:bg-white hover:text-primaryBlue transition-all">
              Cek Jadwal Tryout
            </button>
          </div>
        </div>
        <div class="hidden lg:flex justify-end animate-fadeUp animate-float" style="animation-delay: 0.2s">
          <img src="images/bg--1--1.png" class="w-full max-w-[650px] drop-shadow-2xl">
        </div>
      </div>
    </section>

    <section class="bg-lightPink py-16 md:py-24">
      <div class="max-w-[1376px] mx-auto px-6">
        <h2 class="font-extrabold text-3xl md:text-4xl mb-8 md:mb-12 text-center lg:text-left">
          Bagaimana cara daftar Tryout <span class="text-primaryBlue">Lenterago?</span>
        </h2>
        <div class="bg-[#ebe5e5] rounded-3xl p-6 md:p-10 lg:flex gap-12 items-center animate-fadeUp">
          <img src="images/alur-1.png" alt="Alur Pendaftaran Tryout" class="w-full lg:w-3/4 mb-6 lg:mb-0">
          <img src="images/alur--1--1.png" alt="Ilustrasi Bingung" class="hidden lg:block w-[260px]">
        </div>
      </div>
    </section>

    <section id="jadwal" class="py-16 md:py-24">
      <div class="max-w-[1376px] mx-auto px-6">
        <div class="text-center mb-12 md:mb-16 animate-fadeUp">
            <h2 class="font-extrabold text-slate-800 text-3xl md:text-4xl lg:text-5xl mb-4">Pilih Paket Tryout Kamu</h2>
            <div class="h-1.5 w-24 bg-primaryYellow mx-auto rounded-full"></div>
        </div>
        <div id="jadwal-container" class="relative">
            <div id="loading-state" class="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12 max-w-5xl mx-auto">
                <div class="shimmer-wrapper h-[450px] w-full max-w-[500px] mx-auto"></div>
                <div class="shimmer-wrapper h-[450px] w-full max-w-[500px] mx-auto"></div>
            </div>
            <div id="jadwal-cards" class="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12 max-w-5xl mx-auto justify-items-center"></div>
        </div>
      </div>
    </section>

  </main>

  <div id="siteFooter"></div>

  <script>
    // 1. INJECTOR (Header & Footer)
    async function injectPart(id, file) {
      const el = document.getElementById(id);
      if(!el) return;
      try {
        const res = await fetch(file);
        if (res.ok) el.innerHTML = await res.text();
      } catch(e) { console.error("Error loading " + file, e); }
    }

    injectPart("siteHeader", "../header.html").then(() => {
      // Logic tombol menu mobile dari template baru
      const menuBtn = document.getElementById("menuBtn");
      const mobileNav = document.getElementById("mobileNav");
      menuBtn?.addEventListener("click", () => mobileNav.classList.toggle("hidden"));
    });

    injectPart("siteFooter", "../footer.html");

    // 2. SCROLL LOGIC
    document.getElementById("btn-cek-jadwal")?.addEventListener("click", () => {
      document.getElementById("jadwal").scrollIntoView({ behavior: "smooth", block: "start" });
    });

    // 3. DATA FETCHING (CSV)
    function parseCSV(text) {
      const rows = [];
      let row = [], col = "", inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        if (inQuotes) {
          if (c === '"' && text[i+1] === '"') { col += '"'; i++; }
          else if (c === '"') inQuotes = false;
          else col += c;
        } else {
          if (c === '"') inQuotes = true;
          else if (c === ',') { row.push(col); col = ""; }
          else if (c === '\n') { row.push(col); rows.push(row); row = []; col = ""; }
          else if (c !== '\r') col += c;
        }
      }
      row.push(col); rows.push(row); return rows;
    }

    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQf4c77CKU9bs4Vl4uXub6LY5mXKf7U6gg2B1TBjfpZuwxGpF0mev6QPnHQeFiaWmwgqCs1wUiyq4jP/pub?gid=43053016&single=true&output=csv";
    const container = document.getElementById("jadwal-cards");
    const loadingState = document.getElementById("loading-state");

    fetch(CSV_URL + "&cb=" + Date.now())
      .then(r => r.text())
      .then(text => {
        loadingState.classList.add('hidden');
        const rows = parseCSV(text);
        const headers = rows.shift().map(h => h.trim().toLowerCase());

        rows.forEach((r, i) => {
          const d = Object.fromEntries(headers.map((h, idx) => [h, r[idx]?.trim() || ""]));
          if (d.status !== "active") return;

          const isSAT = d["event name"].toUpperCase().includes("SAT");
          const badge = isSAT ? "images/badge-sat.png" : "images/badge-utbk.png";

          const card = document.createElement("div");
          card.className = "relative card-glass rounded-[32px] p-8 lg:p-10 pt-16 flex flex-col justify-between opacity-0 animate-fadeUp shadow-xl shadow-slate-200/50 w-full max-w-[500px] mx-auto";
          card.style.animationDelay = `${i * 0.15}s`;

          card.innerHTML = `
            <div class="absolute -top-8 left-1/2 -translate-x-1/2 w-16 h-16 bg-white rounded-2xl shadow-lg flex items-center justify-center border border-slate-100 p-2">
               <img src="${badge}" class="w-full h-full object-contain" onerror="this.src='https://ui-avatars.com/api/?name=${isSAT?'S':'U'}&background=0b7cd2&color=fff'" />
            </div>
            <div class="text-center">
              <h3 class="font-extrabold text-red-500 text-2xl md:text-3xl mb-6 md:mb-8 leading-tight">${d["event name"]}</h3>
              <div class="space-y-5 md:space-y-6 text-slate-600 mb-8 md:mb-10">
                <div class="bg-slate-50 rounded-2xl py-4">
                  <p class="text-xs md:text-sm font-bold uppercase tracking-wider text-slate-400 mb-1">Periode Pelaksanaan</p>
                  <p class="text-base md:text-lg font-semibold text-slate-800">${d["periode pelaksanaan"]}</p>
                </div>
                <div class="flex justify-between items-center px-2 md:px-4">
                   <div class="text-left">
                     <p class="text-[10px] md:text-xs font-bold text-slate-400 uppercase">Rilis Hasil</p>
                     <p class="text-sm md:text-base font-bold text-slate-700">${d["rilis hasil"]}</p>
                   </div>
                   <div class="text-right">
                     <p class="text-[10px] md:text-xs font-bold text-slate-400 uppercase">Biaya</p>
                     <p class="text-xl md:text-2xl font-black text-primaryBlue">${d["biaya"]}</p>
                   </div>
                </div>
                <p class="text-xs md:text-sm italic text-slate-400 bg-yellow-50 py-2 rounded-lg border border-yellow-100/50">
                  ${d["note"] || "Quota terbatas! Segera daftar."}
                </p>
              </div>
            </div>
            <a href="https://to.lenterago.id/daftar?event=${encodeURIComponent(d["event name"])}"
               class="bg-primaryYellow text-primaryBlue font-black text-lg md:text-xl py-3 md:py-4 rounded-2xl btn-glow transition-all text-center block shadow-md">
              Daftar Sekarang
            </a>
          `;
          container.appendChild(card);
        });
      })
      .catch(err => {
        container.innerHTML = "<p class='text-center col-span-2 text-red-500'>Gagal memuat data. Silakan refresh halaman.</p>";
      });
  </script>
</body>
</html>
